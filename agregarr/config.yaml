name: "Agregarr"
slug: "agregarr"
version: "latest"
description: >
  Build and maintain Plex collections from list providers, request sources, and media automation tools.
url: "https://github.com/agregarr/agregarr"

arch:
  - amd64
  - aarch64

startup: application
boot: auto
backup: hot
panel_icon: mdi:animation-play

ports:
  "7171/tcp": 7171
ports_description:
  "7171/tcp": "Agregarr web interface"

webui: "http://[HOST]:[PORT:7171]/"
watchdog: "tcp://[HOST]:[PORT:7171]"

map:
  - type: data
    read_only: false
    path: /app/config
  - type: media
    read_only: false
    path: /media
  - type: share
    read_only: false
    path: /share

image: "agregarr/agregarr"
legacy: true
