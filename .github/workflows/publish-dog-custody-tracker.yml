name: Publish Dog Custody Tracker

on:
  push:
    branches:
      - main
    paths:
      - "dog_custody_tracker/**"
      - ".github/workflows/publish-dog-custody-tracker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        shell: bash
        run: |
          version="$(grep '^version:' dog_custody_tracker/config.yaml | sed 's/version: "//; s/"$//')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Capture build timestamp
        id: build_meta
        shell: bash
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./dog_custody_tracker
          file: ./dog_custody_tracker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/peskinator/dog-custody-tracker:${{ steps.addon.outputs.version }}
            ghcr.io/peskinator/dog-custody-tracker:latest
          build-args: |
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_DATE=${{ steps.build_meta.outputs.date }}
